<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dom-form</title>

<style>

body{
    background:#0f172a;   /* dark navy background */
    color:#e2e8f0;        /* soft white text */
    font-family:Arial;
}

fieldset{
    width:18%;
    margin:0 auto;
    background:#1e293b;   /* dark card background */
    border:2px solid #38bdf8; 
    border-radius:10px;
    padding:15px;
    box-shadow:0 0 15px rgba(56,189,248,0.4);
}

/* Checkbox Style */
input[type="checkbox"]{
    width:18px;
    height:18px;
    cursor:pointer;
    accent-color:#38bdf8;   /* sky blue */
    margin-right:6px;
}

/* Radio Style */
input[type="radio"]{
    width:18px;
    height:18px;
    cursor:pointer;
    accent-color:#f59e0b;   /* orange */
    margin-right:6px;
}

/* Input Style */
input, textarea{
    padding:6px;
    margin-top:4px;
    margin-bottom:8px;
    border:1px solid #38bdf8;
    border-radius:5px;
    background:#0f172a;
    color:#e2e8f0;
}

/* Button Style */
input[type="button"], input[type="reset"]{
    padding:8px 15px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#38bdf8;
    color:#0f172a;
    font-weight:bold;
}

input[type="button"]:hover{
    background:#0ea5e9;
}

input[type="reset"]{
    background:#f59e0b;
}

input[type="reset"]:hover{
    background:#d97706;
}
</style>
</head>

<body>

<fieldset>
    <legend> <h2>Student Details</h2></legend>

    <form action="" name="frm">

<label>id</label> <br>
<input type="number" name="id"> <br>

<label>first name</label> <br>
<input type="text" name="fn"> <br>

<label>last name</label> <br>
<input type="text" name="ln"> <br>

<label>full name</label> <br>
<input type="text" name="fuln"> <br>

<label>email</label> <br>
<input type="email" name="eml"> <br>

<label>phone number</label> <br>
<input type="number" name="nmbr"> <br>

<label>address</label> <br>
<textarea name="add"></textarea>

<br><br>

<!-- Checkbox -->
<input type="checkbox" name="dg" value="ssc"> SSC
<input type="checkbox" name="dg" value="hsc"> HSC
<input type="checkbox" name="dg" value="bsc"> BSC

<br><br>

<!-- Radio -->
<label>male</label>
<input type="radio" name="gndr">

<label>female</label>
<input type="radio" name="gndr">

<label>other</label>
<input type="radio" name="gndr">

<br><br>

<input type="button" value="submit" onclick="show()">
<input type="reset" value="reset">

</form>
</fieldset>

<script>

function show(){

id = document.frm.id.value;
fn = document.frm.fn.value;
ln = document.frm.ln.value;
fuln = document.frm.fuln.value;
email = document.frm.eml.value;
phone = document.frm.nmbr.value;
addr = document.frm.add.value;

/* Checkbox */
let degree = "";
const dg = document.frm.dg;

for(let i = 0; i < dg.length; i++){
    if(dg[i].checked){
        degree += dg[i].value + " ";
    }
}

/* Radio Validation */

let gender = "";
const gndr = document.frm.gndr;

let selected = false;

for(let i=0;i<gndr.length;i++){
    if(gndr[i].checked){
        gender = gndr[i].previousElementSibling.innerText;
        selected = true;
    }
}

if(!selected){
    alert("Please select gender");
    return;
}

/* New Window */

store = window.open("","","width=500px,height=500px");



store.document.write("ID : " + id +"<br>");
store.document.write("First name : " + fn+"<br>");
store.document.write("Last name : " + ln+"<br>");
store.document.write("Full name : " + fuln+"<br>");
store.document.write("Email : " + email+"<br>");
store.document.write("Phone number : " + phone+"<br>");
store.document.write("Address : " + addr+"<br>");
store.document.write("Degree : " + degree+"<br>");
store.document.write("Gender : " + gender+"<br>");



/* Buttons */
store.document.write("<button onclick='window.close()'>Close Me</button>");
store.document.write("<button onclick='window.print()'>Print</button> ");
}

</script>

</body>
</html>
