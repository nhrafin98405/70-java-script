<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>



    <script>

let num = Number(prompt("enter the number"));
let fctv = 1;

if(num<0){
    document.write("is not factorial");
}
else{
    for(let i = 1; i<=num; i++){

        fctv *= i;
    }

    document.write(num +"factorial is :- " +fctv);
}


    </script>
    
</body>
</html>
