<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>



    <script>


let num = Number(prompt("enter the number"));

let first = 0;
let second = 1;


document.write(first + "  "+second+"  ");


for(let i=3;i<=num;i++){
    let next = first + second;
    document.write(next +" ");

    first=second;
    second=next;
}

    </script>
                
</body>
</html>
