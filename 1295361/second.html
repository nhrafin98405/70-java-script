<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greading</title>
</head>
<body>


    <script>

    let getNumber = Number(prompt("Enter The Marks : "));

    if(getNumber >= 80 ){
        document.write("A+");
    }else if(getNumber >= 70){
        document.write("A");
    }else if(getNumber >= 60){
        document.write("B");
    }else{
        document.write("Fail");
    }


    </script>
    
</body>
</html>
