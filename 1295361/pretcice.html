    <script>


        let num =[0,5,0,3,4,5,6,-6,7,-4,-2,5,3,-3,-6,-7,-8,4,-98,0,-52,0,50,-80,70,0,0,0]

        let positive=0;
        let negetive=0;
        let zero =0;
        let sum = 0;

        for(let i=0;i<num.length; i++){
            if(num[i] > 0){
                positive++;
            }else if(num[i]<0){
                negetive++;
            }else{
                zero++;
            }
            sum += num[i];
        }

        document.write("positive number = "+positive+"<br>");
        document.write("negetive number = "+negetive+"<br>");
        document.write("zero number = "+zero+"<br>");
        document.write("sum number = "+sum+"<br>");


    </script>
